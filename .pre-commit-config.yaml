default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: mcp-govcheck-ruff
        name: mcp-govcheck ruff
        entry: python -m ruff check src tests
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mcp-govcheck-gitleaks-staged
        name: mcp-govcheck gitleaks staged scan
        entry: gitleaks git --staged --redact --no-banner
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mcp-govcheck-mypy
        name: mcp-govcheck mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mcp-govcheck-pytest
        name: mcp-govcheck pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mcp-govcheck-evals
        name: mcp-govcheck evals
        entry: python evals/run_evals.py --no-write
        language: system
        pass_filenames: false
        stages: [pre-push]
